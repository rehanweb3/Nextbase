events {
    worker_connections 1024;
}

stream {
    # ── Direct PostgreSQL (port 5432) ─────────────────────────────
    upstream postgres_direct {
        server postgres:5432;
    }

    # ── PgBouncer pooler (port 6543) ──────────────────────────────
    upstream postgres_pooler {
        server pgbouncer:5432;
    }

    server {
        listen 5432;
        proxy_pass postgres_direct;
        proxy_connect_timeout 5s;
        proxy_timeout 600s;
        proxy_buffer_size 16k;
    }

    server {
        listen 6543;
        proxy_pass postgres_pooler;
        proxy_connect_timeout 5s;
        proxy_timeout 600s;
        proxy_buffer_size 16k;
    }
}
